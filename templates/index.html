<!doctype html>
<html lang="ru">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="utf-8">
    <title>To-Do</title>
</head>
<body class="bg-light"> <!-- Светлый фон страницы -->
    <div class="container py-5"> <!-- Отступы сверху/снизу 5 единиц -->
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h1 class="text-center mb-4 text-primary">📝 Мой To-Do Список</h1>
                <!-- Сюда будем вставлять форму и список -->
            </div>
        </div>
    </div>

    <h1>Мой To-Do</h1>

    <form action="/add" method="post" class="mb-4">
        <div class="input-group">
            <input type="text" name="title" class="form-control" placeholder="Что нужно сделать?" required>
            <button class="btn btn-success" type="submit">Добавить</button>
        </div>
        <input type="text" name="title" placeholder="Новая задача">
        <button type="submit">Добавить</button>
    </form>

        <form action="/delete" method="post">
        <button type="submit">Удалить</button>



    <h2>Список задач</h2>

    <ul>
        {% for task in tasks %}
            <li>#{{ task[0] }} - {{ task[1] }} - {{task[2]}}</li></form>
        <form action="/delete/{{task[0]}}" method="post">
        <button type="submit">Удалить</button>


    </form>
    <form action="/toggle/{{task[0]}}" method="post">
        <button type="submit">Галочка</button>
    </form>
        {% endfor %}
    </ul>
</body>
</html>
